<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Aether</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Menu Button (Three lines) -->
<div class="menu-btn" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
</div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
    <div class="logo">AETHER</div>
    <a href="dashboard.html" class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
    <a href="jobs.html" class="nav-item"><i class="fas fa-briefcase"></i> Jobs</a>
    <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i> Wallet</a>
    <a href="products.html" class="nav-item"><i class="fas fa-store"></i> Marketplace</a>
    <div id="adminNavItem" style="display: none;">
        <a href="admin.html" class="nav-item"><i class="fas fa-shield-alt"></i> Admin</a>
    </div>
    <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Overlay -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="main">
    <!-- User Header with Avatar -->
    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
        <div class="dashboard-avatar" id="avatarContainer">
            <i class="fas fa-user" id="avatarIcon" style="font-size: 1.5rem; color: white;"></i>
            <img id="dashboardAvatar" style="width: 100%; height: 100%; object-fit: cover; display: none;">
        </div>
        <div>
            <h1 id="welcomeMsg">Dashboard</h1>
            <p id="userEmail" style="color: rgba(232,232,232,0.6);"></p>
        </div>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card"><h3>Wallet Balance</h3><div class="value" id="walletBalance">$0</div></div>
        <div class="stat-card"><h3>Applications Sent</h3><div class="value" id="appCount">0</div></div>
        <div class="stat-card"><h3>Jobs Posted</h3><div class="value" id="jobsPosted">0</div></div>
        <div class="stat-card"><h3>Verified</h3><div class="value" id="verifiedBadge">❌</div></div>
    </div>
    
    <div class="card" style="margin-bottom: 30px;">
        <h3>Quick Actions</h3>
        <div style="display: flex; gap: 15px; margin-top: 20px; flex-wrap: wrap;">
            <button class="btn-primary" onclick="window.location.href='jobs.html'">📋 Browse Jobs</button>
            <button class="btn-outline" onclick="window.location.href='products.html'">🛒 Marketplace</button>
            <button class="btn-outline" onclick="window.location.href='profile.html'">✏️ Edit Profile</button>
        </div>
    </div>
    
    <div class="card">
        <h3>Recent Jobs</h3>
        <div id="recentJobs" style="margin-top: 20px;"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Supabase Config (inlined)
    const SUPABASE_URL = 'https://kpzkjytpbyzhurbvnoyh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwemtqeXRwYnl6aHVyYnZub3loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTA2NDMsImV4cCI6MjA5MTI2NjY0M30.fkmq5eanpSkSlnsnhLgUZ94b-6kZ4W7mqL1Dvo4vpcQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const AVATAR_BUCKET = 'avatars';
    const JOB_BUCKET = 'job-images';
    const PRODUCT_BUCKET = 'product-images';
    
    let currentUser = null;
    
    // Sidebar functions
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('active');
        document.body.style.overflow = '';
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function getPublicUrl(bucket, path) {
        if (!path) return null;
        const { data } = supabaseClient.storage.from(bucket).getPublicUrl(path);
        return data.publicUrl;
    }
    
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.textContent = message;
        notification.style.position = 'fixed';
        notification.style.bottom = '20px';
        notification.style.right = '20px';
        notification.style.background = type === 'success' ? '#00FFC8' : '#FF3366';
        notification.style.color = type === 'success' ? '#0A0A0F' : '#FFFFFF';
        notification.style.padding = '12px 24px';
        notification.style.borderRadius = '50px';
        notification.style.zIndex = '2000';
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }
    
    function displayDashboardAvatar(avatarPath) {
        const avatarIcon = document.getElementById('avatarIcon');
        const avatarImg = document.getElementById('dashboardAvatar');
        
        if (avatarPath) {
            const url = getPublicUrl(AVATAR_BUCKET, avatarPath);
            if (url) {
                avatarImg.src = url;
                avatarImg.style.display = 'block';
                avatarIcon.style.display = 'none';
            }
        } else {
            avatarImg.style.display = 'none';
            avatarIcon.style.display = 'flex';
        }
    }
    
    async function loadDashboard() {
        try {
            const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
            if (userError || !user) { 
                window.location.href = 'login.html'; 
                return; 
            }
            currentUser = user;
            
            // Check if user is admin (earnfluencex@gmail.com)
            const isAdmin = user.email === 'earnfluencex@gmail.com';
            if (isAdmin) {
                document.getElementById('adminNavItem').style.display = 'block';
            }
            
            const { data: profile, error: profileError } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
            
            document.getElementById('welcomeMsg').innerHTML = `Welcome, ${profile?.full_name || user.email?.split('@')[0] || 'User'}`;
            document.getElementById('userEmail').innerHTML = user.email;
            document.getElementById('verifiedBadge').innerHTML = profile?.verified ? '✅' : '❌';
            
            if (profile?.avatar_url) {
                displayDashboardAvatar(profile.avatar_url);
            }
            
            const { data: transactions } = await supabaseClient.from('transactions').select('amount').eq('user_id', user.id);
            const balance = transactions?.reduce((sum, t) => sum + t.amount, 0) || 0;
            document.getElementById('walletBalance').innerHTML = `$${balance.toFixed(2)}`;
            
            const { data: applications } = await supabaseClient.from('applications').select('id').eq('user_id', user.id);
            document.getElementById('appCount').innerHTML = applications?.length || 0;
            
            const { data: userJobs } = await supabaseClient.from('jobs').select('id').eq('posted_by', user.id);
            document.getElementById('jobsPosted').innerHTML = userJobs?.length || 0;
            
            const { data: jobs } = await supabaseClient.from('jobs').select('*').order('created_at', { ascending: false }).limit(5);
            
            const recentJobsDiv = document.getElementById('recentJobs');
            if (jobs && jobs.length > 0) {
                recentJobsDiv.innerHTML = jobs.map(job => `
                    <div style="padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <div style="font-weight: 600;">${escapeHtml(job.title)}</div>
                        <div style="color: #00FFC8; font-size: 0.85rem;">${escapeHtml(job.company)}</div>
                        <div style="font-size: 0.8rem; color: rgba(232,232,232,0.5); margin-top: 5px;">${job.location || 'Remote'} • ${job.type || 'Full-time'}</div>
                    </div>
                `).join('');
            } else {
                recentJobsDiv.innerHTML = '<p style="color: rgba(232,232,232,0.5);">No jobs yet. Be the first to post!</p>';
            }
        } catch (error) {
            console.error('Dashboard error:', error);
            showNotification('Error loading dashboard', 'error');
        }
    }
    
    window.logout = async function() {
        await supabaseClient.auth.signOut();
        window.location.href = 'index.html';
    };
    
    // Make sidebar functions global
    window.toggleSidebar = toggleSidebar;
    window.closeSidebar = closeSidebar;
    
    loadDashboard();
</script>
</body>
</html>
