<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job - Aether</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .image-preview {
            width: 100%;
            height: 150px;
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(0,255,200,0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            overflow: hidden;
            position: relative;
        }
        .image-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .remove-image {
            position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.7);
            border-radius: 50%; width: 25px; height: 25px; display: flex;
            align-items: center; justify-content: center; cursor: pointer; color: #FF3366;
        }
    </style>
</head>
<body>

<!-- Desktop Sidebar -->
<div class="sidebar">
    <div class="logo">AETHER</div>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
    <a href="jobs.html" class="nav-item"><i class="fas fa-briefcase"></i> Jobs</a>
    <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i> Wallet</a>
    <a href="products.html" class="nav-item"><i class="fas fa-store"></i> Marketplace</a>
    <div id="adminNavItem" style="display: none;">
        <a href="admin.html" class="nav-item"><i class="fas fa-shield-alt"></i> Admin</a>
    </div>
    <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Mobile Sidebar -->
<div id="mobileSidebar" class="sidebar-mobile">
    <div class="logo">AETHER</div>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
    <a href="jobs.html" class="nav-item"><i class="fas fa-briefcase"></i> Jobs</a>
    <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i> Wallet</a>
    <a href="products.html" class="nav-item"><i class="fas fa-store"></i> Marketplace</a>
    <div id="mobileAdminNavItem" style="display: none;">
        <a href="admin.html" class="nav-item"><i class="fas fa-shield-alt"></i> Admin</a>
    </div>
    <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Overlay -->
<div id="menuOverlay" class="menu-overlay" onclick="closeMobileMenu()"></div>

<div class="main">
    <!-- Mobile menu button -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div style="width: 40px;"></div>
    </div>
    
    <div style="max-width: 700px; margin: 0 auto;">
        <h1>Post a Job</h1>
        <p style="color: rgba(232,232,232,0.6); margin-bottom: 30px;">Reach qualified professionals</p>
        
        <div class="card">
            <div class="input-group"><label>Job Title *</label><input type="text" id="jobTitle" placeholder="e.g., Senior Frontend Developer"></div>
            <div class="input-group"><label>Company Name *</label><input type="text" id="jobCompany" placeholder="Your company name"></div>
            <div class="input-group"><label>Company Logo</label>
                <input type="file" id="companyLogo" accept="image/jpeg,image/png,image/gif">
                <div id="logoPreview" class="image-preview" style="display: none;"></div>
            </div>
            <div class="input-group"><label>Location</label><input type="text" id="jobLocation" placeholder="City, Country or Remote"></div>
            <div class="input-group"><label>Job Type</label><select id="jobType"><option>Full-time</option><option>Part-time</option><option>Contract</option><option>Remote</option></select></div>
            <div class="input-group"><label>Salary Range</label><input type="text" id="jobSalary" placeholder="e.g., $50,000 - $70,000"></div>
            <div class="input-group"><label>Job Description</label><textarea id="jobDesc" rows="8" placeholder="Describe the role, responsibilities, and requirements..."></textarea></div>
            
            <button class="btn-primary" style="width:100%" onclick="submitJob()">Post Job ($49) →</button>
            <p style="text-align: center; margin-top: 20px; font-size: 0.8rem; color: rgba(232,232,232,0.4);">Payment integration coming soon. Demo mode active.</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Supabase Config (inlined)
    const SUPABASE_URL = 'https://kpzkjytpbyzhurbvnoyh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwemtqeXRwYnl6aHVyYnZub3loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTA2NDMsImV4cCI6MjA5MTI2NjY0M30.fkmq5eanpSkSlnsnhLgUZ94b-6kZ4W7mqL1Dvo4vpcQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const AVATAR_BUCKET = 'avatars';
    const JOB_BUCKET = 'job-images';
    const PRODUCT_BUCKET = 'product-images';
    
    let currentLogoFile = null;
    
    function showNotification(message) {
        const notification = document.createElement('div');
        notification.textContent = message;
        notification.style.position = 'fixed';
        notification.style.bottom = '20px';
        notification.style.right = '20px';
        notification.style.background = '#00FFC8';
        notification.style.color = '#0A0A0F';
        notification.style.padding = '12px 24px';
        notification.style.borderRadius = '50px';
        notification.style.zIndex = '2000';
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }
    
    document.getElementById('companyLogo').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        currentLogoFile = file;
        const reader = new FileReader();
        reader.onload = (event) => {
            const preview = document.getElementById('logoPreview');
            preview.style.display = 'flex';
            preview.innerHTML = `<img src="${event.target.result}"><div class="remove-image" onclick="removeLogo()">✕</div>`;
        };
        reader.readAsDataURL(file);
    });
    
    function removeLogo() {
        currentLogoFile = null;
        document.getElementById('companyLogo').value = '';
        document.getElementById('logoPreview').style.display = 'none';
    }
    
    async function uploadLogo(userId, jobId) {
        if (!currentLogoFile) return null;
        const fileName = `job_${userId}_${jobId}.${currentLogoFile.name.split('.').pop()}`;
        await supabaseClient.storage.from(JOB_BUCKET).upload(fileName, currentLogoFile);
        const { data } = supabaseClient.storage.from(JOB_BUCKET).getPublicUrl(fileName);
        return data.publicUrl;
    }
    
    async function submitJob() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { window.location.href = 'login.html'; return; }
        
        const title = document.getElementById('jobTitle').value;
        const company = document.getElementById('jobCompany').value;
        if (!title || !company) { alert('Please fill in job title and company'); return; }
        
        const jobData = {
            title, company,
            location: document.getElementById('jobLocation').value,
            type: document.getElementById('jobType').value,
            salary_range: document.getElementById('jobSalary').value,
            description: document.getElementById('jobDesc').value,
            posted_by: user.id
        };
        
        const { data: job, error } = await supabaseClient.from('jobs').insert([jobData]).select();
        if (error) { alert('Error: ' + error.message); return; }
        
        if (currentLogoFile && job && job[0]) {
            const logoUrl = await uploadLogo(user.id, job[0].id);
            if (logoUrl) await supabaseClient.from('jobs').update({ logo_url: logoUrl }).eq('id', job[0].id);
        }
        
        showNotification('Job posted successfully!');
        setTimeout(() => window.location.href = 'jobs.html', 1500);
    }
    
    async function loadUserForAdmin() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user && user.email === 'earnfluencex@gmail.com') {
            document.getElementById('adminNavItem').style.display = 'block';
            document.getElementById('mobileAdminNavItem').style.display = 'block';
        }
    }
    
    function toggleMobileMenu() {
        document.getElementById('mobileSidebar').classList.toggle('open');
        document.getElementById('menuOverlay').classList.toggle('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeMobileMenu() {
        document.getElementById('mobileSidebar').classList.remove('open');
        document.getElementById('menuOverlay').classList.remove('active');
        document.body.style.overflow = '';
    }
    
    window.logout = async function() { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; };
    
    loadUserForAdmin();
</script>
</body>
</html>
