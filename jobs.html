<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs - Aether</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Desktop Sidebar -->
<div class="sidebar">
    <div class="logo">AETHER</div>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
    <a href="jobs.html" class="nav-item active"><i class="fas fa-briefcase"></i> Jobs</a>
    <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i> Wallet</a>
    <a href="products.html" class="nav-item"><i class="fas fa-store"></i> Marketplace</a>
    <div id="adminNavItem" style="display: none;">
        <a href="admin.html" class="nav-item"><i class="fas fa-shield-alt"></i> Admin</a>
    </div>
    <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Mobile Sidebar -->
<div id="mobileSidebar" class="sidebar-mobile">
    <div class="logo">AETHER</div>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
    <a href="jobs.html" class="nav-item"><i class="fas fa-briefcase"></i> Jobs</a>
    <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i> Wallet</a>
    <a href="products.html" class="nav-item"><i class="fas fa-store"></i> Marketplace</a>
    <div id="mobileAdminNavItem" style="display: none;">
        <a href="admin.html" class="nav-item"><i class="fas fa-shield-alt"></i> Admin</a>
    </div>
    <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Overlay -->
<div id="menuOverlay" class="menu-overlay" onclick="closeMobileMenu()"></div>

<div class="main">
    <!-- Mobile menu button -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
            <i class="fas fa-bars"></i>
        </button>
        <div style="width: 40px;"></div>
    </div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px;">
        <h1>Job Marketplace</h1>
        <div style="display: flex; gap: 15px;">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="searchInput" placeholder="Search jobs..." style="padding: 10px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,200,0.2); border-radius: 12px; color: white;">
                <button class="btn-primary" onclick="searchJobs()">Search</button>
            </div>
            <button class="btn-primary" onclick="openPostModal()">+ Post a Job</button>
        </div>
    </div>
    
    <div id="jobsList" class="jobs-grid"></div>
</div>

<!-- Post Job Modal -->
<div id="postModal" class="modal">
    <div class="modal-content">
        <h3>Post a Job</h3>
        <div class="input-group"><input type="text" id="jobTitle" placeholder="Job Title"></div>
        <div class="input-group"><input type="text" id="jobCompany" placeholder="Company Name"></div>
        <div class="input-group"><input type="text" id="jobLocation" placeholder="Location (or Remote)"></div>
        <div class="input-group"><select id="jobType"><option>Full-time</option><option>Part-time</option><option>Contract</option><option>Remote</option></select></div>
        <div class="input-group"><textarea id="jobDesc" rows="4" placeholder="Job Description"></textarea></div>
        <div class="input-group"><input type="text" id="jobSalary" placeholder="Salary Range (e.g., $50k-$70k)"></div>
        <button class="btn-primary" style="width:100%" onclick="postJob()">Post Job ($49)</button>
        <button class="btn-outline" style="width:100%; margin-top:10px" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Supabase Config (inlined)
    const SUPABASE_URL = 'https://kpzkjytpbyzhurbvnoyh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwemtqeXRwYnl6aHVyYnZub3loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTA2NDMsImV4cCI6MjA5MTI2NjY0M30.fkmq5eanpSkSlnsnhLgUZ94b-6kZ4W7mqL1Dvo4vpcQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const AVATAR_BUCKET = 'avatars';
    const JOB_BUCKET = 'job-images';
    const PRODUCT_BUCKET = 'product-images';
    
    let allJobs = [];
    
    function escapeHtml(text) {
        if(!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.textContent = message;
        notification.style.position = 'fixed';
        notification.style.bottom = '20px';
        notification.style.right = '20px';
        notification.style.background = type === 'success' ? '#00FFC8' : '#FF3366';
        notification.style.color = type === 'success' ? '#0A0A0F' : '#FFFFFF';
        notification.style.padding = '12px 24px';
        notification.style.borderRadius = '50px';
        notification.style.zIndex = '2000';
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }
    
    async function loadJobs() {
        const { data: jobs } = await supabaseClient.from('jobs').select('*').order('created_at', { ascending: false });
        allJobs = jobs || [];
        displayJobs(allJobs);
    }
    
    function displayJobs(jobs) {
        const container = document.getElementById('jobsList');
        if(!jobs.length) { container.innerHTML = '<div class="card"><p>No jobs found. Be the first to post!</p></div>'; return; }
        
        container.innerHTML = jobs.map(job => `
            <div class="job-card">
                <div class="job-title">${escapeHtml(job.title)}</div>
                <div class="job-company">${escapeHtml(job.company)}</div>
                <div class="job-meta">
                    <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location || 'Remote')}</span>
                    <span><i class="fas fa-clock"></i> ${escapeHtml(job.type || 'Full-time')}</span>
                    <span><i class="fas fa-dollar-sign"></i> ${escapeHtml(job.salary_range || 'Negotiable')}</span>
                </div>
                <p>${escapeHtml(job.description?.substring(0, 200))}${job.description?.length > 200 ? '...' : ''}</p>
                <button class="btn-sm" onclick="applyToJob('${job.id}')">Apply Now</button>
            </div>
        `).join('');
    }
    
    function searchJobs() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = allJobs.filter(j => j.title.toLowerCase().includes(query) || j.company.toLowerCase().includes(query));
        displayJobs(filtered);
    }
    
    async function applyToJob(jobId) {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if(!user) { alert('Please login first'); return; }
        await supabaseClient.from('applications').insert([{ job_id: jobId, user_id: user.id }]);
        showNotification('Application submitted successfully!');
    }
    
    async function postJob() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if(!user) { alert('Please login first'); return; }
        
        const jobData = {
            title: document.getElementById('jobTitle').value,
            company: document.getElementById('jobCompany').value,
            location: document.getElementById('jobLocation').value,
            type: document.getElementById('jobType').value,
            description: document.getElementById('jobDesc').value,
            salary_range: document.getElementById('jobSalary').value,
            posted_by: user.id
        };
        
        if(!jobData.title || !jobData.company) {
            alert('Please fill in job title and company');
            return;
        }
        
        await supabaseClient.from('jobs').insert([jobData]);
        showNotification('Job posted successfully!');
        closeModal();
        loadJobs();
        
        document.getElementById('jobTitle').value = '';
        document.getElementById('jobCompany').value = '';
        document.getElementById('jobLocation').value = '';
        document.getElementById('jobDesc').value = '';
        document.getElementById('jobSalary').value = '';
    }
    
    async function loadUserForAdmin() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user && user.email === 'earnfluencex@gmail.com') {
            document.getElementById('adminNavItem').style.display = 'block';
            document.getElementById('mobileAdminNavItem').style.display = 'block';
        }
    }
    
    function openPostModal() { document.getElementById('postModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('postModal').style.display = 'none'; }
    
    function toggleMobileMenu() {
        document.getElementById('mobileSidebar').classList.toggle('open');
        document.getElementById('menuOverlay').classList.toggle('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeMobileMenu() {
        document.getElementById('mobileSidebar').classList.remove('open');
        document.getElementById('menuOverlay').classList.remove('active');
        document.body.style.overflow = '';
    }
    
    window.logout = async function() { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; };
    window.searchJobs = searchJobs;
    window.applyToJob = applyToJob;
    window.postJob = postJob;
    window.openPostModal = openPostModal;
    window.closeModal = closeModal;
    
    loadUserForAdmin();
    loadJobs();
</script>
</body>
</html>
