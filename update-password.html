<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password - Aether</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .password-wrapper {
            position: relative;
            width: 100%;
        }
        .password-wrapper input {
            width: 100%;
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #00FFC8;
            background: transparent;
            border: none;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<nav class="nav"><div class="logo">AETHER</div></nav>

<div class="auth-container">
    <h2 style="margin-bottom: 8px;">Create New Password</h2>
    <p style="color: rgba(232,232,232,0.6); margin-bottom: 30px;">Enter your new password below</p>
    
    <div id="errorMsg" style="background: rgba(255,51,102,0.2); border: 1px solid #FF3366; border-radius: 12px; padding: 12px; margin-bottom: 20px; color: #FF3366; display: none;"></div>
    <div id="successMsg" style="background: rgba(0,255,200,0.2); border: 1px solid #00FFC8; border-radius: 12px; padding: 12px; margin-bottom: 20px; color: #00FFC8; display: none;"></div>
    
    <div class="input-group">
        <div class="password-wrapper">
            <input type="password" id="newPassword" placeholder="New Password (min 6 characters)">
            <button type="button" class="toggle-password" onclick="togglePassword('newPassword')">
                <i class="fas fa-eye-slash"></i>
            </button>
        </div>
    </div>
    
    <div class="input-group">
        <div class="password-wrapper">
            <input type="password" id="confirmPassword" placeholder="Confirm New Password">
            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                <i class="fas fa-eye-slash"></i>
            </button>
        </div>
    </div>
    
    <button class="btn-primary" style="width:100%" onclick="updatePassword()">Update Password →</button>
    <p style="text-align: center; margin-top: 20px; color: rgba(232,232,232,0.5);"><a href="login.html" style="color:#00FFC8">Back to Sign In</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://kpzkjytpbyzhurbvnoyh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwemtqeXRwYnl6aHVyYnZub3loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTA2NDMsImV4cCI6MjA5MTI2NjY0M30.fkmq5eanpSkSlnsnhLgUZ94b-6kZ4W7mqL1Dvo4vpcQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const button = field.parentElement.querySelector('.toggle-password i');
        if (field.type === 'password') {
            field.type = 'text';
            button.classList.remove('fa-eye-slash');
            button.classList.add('fa-eye');
        } else {
            field.type = 'password';
            button.classList.remove('fa-eye');
            button.classList.add('fa-eye-slash');
        }
    }
    
    async function updatePassword() {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        
        if (!newPassword || !confirmPassword) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Please fill in both fields';
            return;
        }
        
        if (newPassword.length < 6) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Password must be at least 6 characters';
            return;
        }
        
        if (newPassword !== confirmPassword) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Passwords do not match';
            return;
        }
        
        try {
            const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
            
            if (error) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = error.message;
            } else {
                successDiv.style.display = 'block';
                successDiv.textContent = 'Password updated successfully! Redirecting to login...';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }
        } catch (err) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Network error. Please try again.';
        }
    }
</script>
</body>
</html>
