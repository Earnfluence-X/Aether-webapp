<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - Aether</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .product-image-preview {
            width: 100%;
            height: 150px;
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(0,255,200,0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            overflow: hidden;
            position: relative;
        }
        .product-image-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">AETHER</div>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
    <a href="jobs.html" class="nav-item"><i class="fas fa-briefcase"></i> Jobs</a>
    <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i> Wallet</a>
    <a href="products.html" class="nav-item active"><i class="fas fa-store"></i> Marketplace</a>
    <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="main">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1>Digital Marketplace</h1>
        <button class="btn-primary" onclick="openSellModal()">+ Sell Product</button>
    </div>
    
    <div id="productsGrid" class="products-grid"></div>
</div>

<!-- Sell Product Modal -->
<div id="sellModal" class="modal">
    <div class="modal-content">
        <h3>Sell a Product</h3>
        <div class="input-group"><input type="text" id="productTitle" placeholder="Product Title"></div>
        <div class="input-group"><textarea id="productDesc" rows="3" placeholder="Description"></textarea></div>
        <div class="input-group"><input type="file" id="productImage" accept="image/jpeg,image/png,image/gif"></div>
        <div id="productImagePreview" class="product-image-preview" style="display: none;"></div>
        <div class="input-group"><input type="number" id="productPrice" placeholder="Price ($)"></div>
        <div class="input-group"><select id="productType"><option>Digital Product</option><option>Service</option><option>Course</option><option>Template</option></select></div>
        <button class="btn-primary" style="width:100%" onclick="sellProduct()">List Product</button>
        <button class="btn-outline" style="width:100%; margin-top:10px" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="script.js"></script>
<script>
    let currentProductImage = null;
    
    // Image preview
    document.getElementById('productImage').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        currentProductImage = file;
        
        const reader = new FileReader();
        reader.onload = (event) => {
            const previewDiv = document.getElementById('productImagePreview');
            previewDiv.style.display = 'flex';
            previewDiv.innerHTML = `<img src="${event.target.result}" style="max-width:100%; max-height:100%;">`;
        };
        reader.readAsDataURL(file);
    });
    
    async function uploadProductImage(userId, productId) {
        if (!currentProductImage) return null;
        
        const fileExt = currentProductImage.name.split('.').pop();
        const fileName = `product_${userId}_${productId}.${fileExt}`;
        
        const { error } = await supabaseClient.storage
            .from('product-images')
            .upload(fileName, currentProductImage);
        
        if (error) return null;
        
        const { data: { publicUrl } } = supabaseClient.storage.from('product-images').getPublicUrl(fileName);
        return publicUrl;
    }
    
    async function loadProducts() {
        const { data: products } = await supabaseClient.from('products').select('*, profiles(full_name)').order('created_at', { ascending: false });
        const container = document.getElementById('productsGrid');
        if(!products?.length) { container.innerHTML = '<p class="text-muted">No products yet. Be the first to sell!</p>'; return; }
        
        container.innerHTML = products.map(p => `
            <div class="product-card">
                ${p.image_url ? `<img src="${p.image_url}" alt="${p.title}">` : '<div style="height:180px; background:linear-gradient(135deg,#00FFC820,#6464FF20); border-radius:12px; margin-bottom:15px; display:flex; align-items:center; justify-content:center;">🖼️ No Image</div>'}
                <h3>${escapeHtml(p.title)}</h3>
                <p style="color: rgba(232,232,232,0.6); font-size: 0.85rem;">${escapeHtml(p.description?.substring(0, 80))}${p.description?.length > 80 ? '...' : ''}</p>
                <div class="product-price">$${p.price}</div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size:0.7rem; color: rgba(232,232,232,0.4);">by ${p.profiles?.full_name || 'Anonymous'}</span>
                    <button class="btn-sm" onclick="buyProduct('${p.id}', ${p.price})">Buy Now</button>
                </div>
            </div>
        `).join('');
    }
    
    async function sellProduct() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if(!user) { alert('Please login first'); return; }
        
        const title = document.getElementById('productTitle').value;
        const price = parseFloat(document.getElementById('productPrice').value);
        
        if(!title || !price) {
            alert('Please fill in title and price');
            return;
        }
        
        const { data: product, error } = await supabaseClient.from('products').insert([{
            seller_id: user.id,
            title: title,
            description: document.getElementById('productDesc').value,
            price: price,
            type: document.getElementById('productType').value
        }]).select();
        
        if (error) {
            alert('Error: ' + error.message);
            return;
        }
        
        // Upload image if exists
        if (currentProductImage && product && product[0]) {
            const imageUrl = await uploadProductImage(user.id, product[0].id);
            if (imageUrl) {
                await supabaseClient.from('products').update({ image_url: imageUrl }).eq('id', product[0].id);
            }
        }
        
        showNotification('Product listed successfully!');
        closeModal();
        loadProducts();
        
        // Clear form
        document.getElementById('productTitle').value = '';
        document.getElementById('productDesc').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productImage').value = '';
        document.getElementById('productImagePreview').style.display = 'none';
        currentProductImage = null;
    }
    
    function escapeHtml(text) {
        if(!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function buyProduct(productId, price) {
        showNotification(`Demo: Purchase of $${price} would be processed here. Payment integration coming soon!`);
    }
    
    function openSellModal() { 
        document.getElementById('sellModal').style.display = 'flex';
        document.getElementById('productImagePreview').style.display = 'none';
        currentProductImage = null;
    }
    function closeModal() { document.getElementById('sellModal').style.display = 'none'; }
    
    async function logout() { await supabaseClient.auth.signOut(); window.location.href = 'index.html'; }
    
    loadProducts();
</script>
</body>
</html>
