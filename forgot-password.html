<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Aether</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav"><div class="logo">AETHER</div></nav>

<div class="auth-container">
    <h2 style="margin-bottom: 8px;">Reset Password</h2>
    <p style="color: rgba(232,232,232,0.6); margin-bottom: 30px;">Enter your email to receive a password reset link</p>
    
    <div id="errorMsg" style="background: rgba(255,51,102,0.2); border: 1px solid #FF3366; border-radius: 12px; padding: 12px; margin-bottom: 20px; color: #FF3366; display: none;"></div>
    <div id="successMsg" style="background: rgba(0,255,200,0.2); border: 1px solid #00FFC8; border-radius: 12px; padding: 12px; margin-bottom: 20px; color: #00FFC8; display: none;"></div>
    
    <div class="input-group"><input type="email" id="email" placeholder="Your Email Address"></div>
    
    <button class="btn-primary" style="width:100%" onclick="resetPassword()">Send Reset Link →</button>
    <p style="text-align: center; margin-top: 20px; color: rgba(232,232,232,0.5);"><a href="login.html" style="color:#00FFC8">Back to Sign In</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://kpzkjytpbyzhurbvnoyh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwemtqeXRwYnl6aHVyYnZub3loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTA2NDMsImV4cCI6MjA5MTI2NjY0M30.fkmq5eanpSkSlnsnhLgUZ94b-6kZ4W7mqL1Dvo4vpcQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    async function resetPassword() {
        const email = document.getElementById('email').value.trim();
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        
        if (!email) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Please enter your email address';
            return;
        }
        
        try {
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: 'https://aether-app.vercel.app/update-password.html'
            });
            
            if (error) {
                errorDiv.style.display = 'block';
                errorDiv.textContent = error.message;
            } else {
                successDiv.style.display = 'block';
                successDiv.textContent = 'Password reset link sent! Check your email.';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            }
        } catch (err) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Network error. Please try again.';
        }
    }
</script>
</body>
</html>
