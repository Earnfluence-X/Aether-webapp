<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Aether</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Menu Button (Three lines) -->
<div class="menu-btn" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
</div>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
    <div class="logo">AETHER</div>
    <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i> Profile</a>
    <a href="jobs.html" class="nav-item"><i class="fas fa-briefcase"></i> Jobs</a>
    <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i> Wallet</a>
    <a href="products.html" class="nav-item"><i class="fas fa-store"></i> Marketplace</a>
    <div id="adminNavItem" style="display: none;">
        <a href="admin.html" class="nav-item"><i class="fas fa-shield-alt"></i> Admin</a>
    </div>
    <a href="#" class="nav-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Overlay -->
<div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="main">
    <div style="max-width: 800px; margin: 0 auto;">
        <h1>Your Profile</h1>
        <p style="color: rgba(232,232,232,0.6); margin-bottom: 30px;">Stand out to employers and clients</p>
        
        <div class="avatar-section">
            <div class="avatar-preview" id="avatarPreview">
                <i class="fas fa-user" id="avatarIcon"></i>
                <img id="avatarImage" style="display: none;">
            </div>
            <div>
                <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/gif" style="display: none;">
                <button class="upload-btn" onclick="document.getElementById('avatarInput').click()">
                    <i class="fas fa-camera"></i> Upload Photo
                </button>
                <div id="uploadStatus" class="upload-status"></div>
            </div>
        </div>
        
        <div id="profileForm">
            <div class="input-group"><label>Full Name</label><input type="text" id="fullName" placeholder="Your full name"></div>
            <div class="input-group"><label>Headline</label><input type="text" id="headline" placeholder="e.g., Senior Product Designer"></div>
            <div class="input-group"><label>Location</label><input type="text" id="location" placeholder="City, Country"></div>
            <div class="input-group"><label>Bio</label><textarea id="bio" rows="4" placeholder="Tell us about yourself..."></textarea></div>
            <div class="input-group"><label>Skills</label><div id="skillsList" class="skills-container"></div><div class="add-skill"><input type="text" id="newSkill" placeholder="Add a skill"><button class="btn-sm" onclick="addSkill()">Add</button></div></div>
            
            <button class="btn-primary" style="width:100%" onclick="saveProfile()">Save Changes</button>
        </div>
        
        <div class="verification-badge">
            <i class="fas fa-shield-alt" style="color:#00FFC8"></i>
            <p>Verification Status: <span id="verifyStatus">Not Verified</span></p>
            <button class="btn-sm" onclick="startVerification()">Get Verified ($10) →</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://kpzkjytpbyzhurbvnoyh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwemtqeXRwYnl6aHVyYnZub3loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTA2NDMsImV4cCI6MjA5MTI2NjY0M30.fkmq5eanpSkSlnsnhLgUZ94b-6kZ4W7mqL1Dvo4vpcQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const AVATAR_BUCKET = 'avartars';
    const JOB_BUCKET = 'job-images';
    const PRODUCT_BUCKET = 'product-images';
    
    let currentUser = null;
    let userSkills = [];
    let currentAvatarUrl = null;
    
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('active');
        document.body.style.overflow = '';
    }
    
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.textContent = message;
        notification.style.position = 'fixed';
        notification.style.bottom = '20px';
        notification.style.right = '20px';
        notification.style.background = type === 'success' ? '#00FFC8' : '#FF3366';
        notification.style.color = type === 'success' ? '#0A0A0F' : '#FFFFFF';
        notification.style.padding = '12px 24px';
        notification.style.borderRadius = '50px';
        notification.style.zIndex = '2000';
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }
    
    function getPublicUrl(bucket, path) {
        if (!path) return null;
        const { data } = supabaseClient.storage.from(bucket).getPublicUrl(path);
        return data.publicUrl;
    }
    
    function displayAvatar(avatarPath) {
        const avatarIcon = document.getElementById('avatarIcon');
        const avatarImage = document.getElementById('avatarImage');
        
        if (avatarPath) {
            const url = getPublicUrl(AVATAR_BUCKET, avatarPath);
            if (url) {
                avatarImage.src = url;
                avatarImage.style.display = 'block';
                avatarIcon.style.display = 'none';
            }
        } else {
            avatarImage.style.display = 'none';
            avatarIcon.style.display = 'flex';
        }
    }
    
    async function uploadAvatar(file) {
        const uploadStatus = document.getElementById('uploadStatus');
        const fileExt = file.name.split('.').pop();
        const fileName = `${currentUser.id}_${Date.now()}.${fileExt}`;
        
        uploadStatus.innerHTML = 'Uploading...';
        uploadStatus.style.color = '#00FFC8';
        
        const { error } = await supabaseClient.storage
            .from(AVATAR_BUCKET)
            .upload(fileName, file);
        
        if (error) {
            uploadStatus.innerHTML = 'Upload failed: ' + error.message;
            uploadStatus.style.color = '#FF3366';
            return null;
        }
        
        uploadStatus.innerHTML = 'Upload complete!';
        setTimeout(() => uploadStatus.innerHTML = '', 2000);
        return fileName;
    }
    
    document.getElementById('avatarInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) { alert('Please select an image file'); return; }
        if (file.size > 5 * 1024 * 1024) { alert('Image must be less than 5MB'); return; }
        
        const avatarPath = await uploadAvatar(file);
        if (avatarPath) {
            currentAvatarUrl = avatarPath;
            displayAvatar(avatarPath);
            await supabaseClient.from('profiles').update({ avatar_url: avatarPath }).eq('id', currentUser.id);
            showNotification('Avatar updated successfully!');
        }
    });
    
    async function loadProfile() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if(!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        
        const isAdmin = user.email === 'earnfluencex@gmail.com';
        if (isAdmin) {
            document.getElementById('adminNavItem').style.display = 'block';
        }
        
        // Fetch profile
        const { data: profile, error } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
        
        if (error) {
            console.error('Error loading profile:', error);
            showNotification('Error loading profile', 'error');
            return;
        }
        
        if(profile) {
            document.getElementById('fullName').value = profile.full_name || '';
            document.getElementById('headline').value = profile.headline || '';
            document.getElementById('location').value = profile.location || '';
            document.getElementById('bio').value = profile.bio || '';
            userSkills = profile.skills || [];
            document.getElementById('verifyStatus').innerHTML = profile.verified ? '✓ Verified' : 'Not Verified';
            currentAvatarUrl = profile.avatar_url;
            displayAvatar(currentAvatarUrl);
            renderSkills();
        }
    }
    
    function renderSkills() {
        const container = document.getElementById('skillsList');
        container.innerHTML = userSkills.map((skill, i) => `<div class="skill-tag">${skill} <i class="fas fa-times" onclick="removeSkill(${i})"></i></div>`).join('');
    }
    
    function addSkill() {
        const newSkill = document.getElementById('newSkill').value.trim();
        if(newSkill && !userSkills.includes(newSkill)) {
            userSkills.push(newSkill);
            renderSkills();
            document.getElementById('newSkill').value = '';
        }
    }
    
    function removeSkill(index) {
        userSkills.splice(index, 1);
        renderSkills();
    }
    
    async function saveProfile() {
        const fullName = document.getElementById('fullName').value;
        const headline = document.getElementById('headline').value;
        const location = document.getElementById('location').value;
        const bio = document.getElementById('bio').value;
        
        // First check if profile exists
        const { data: existingProfile } = await supabaseClient.from('profiles').select('id').eq('id', currentUser.id).single();
        
        let result;
        if (existingProfile) {
            // Update existing profile
            result = await supabaseClient.from('profiles')
                .update({
                    full_name: fullName,
                    headline: headline,
                    location: location,
                    bio: bio,
                    skills: userSkills,
                    avatar_url: currentAvatarUrl,
                    updated_at: new Date()
                })
                .eq('id', currentUser.id);
        } else {
            // Insert new profile
            result = await supabaseClient.from('profiles')
                .insert({
                    id: currentUser.id,
                    full_name: fullName,
                    headline: headline,
                    location: location,
                    bio: bio,
                    skills: userSkills,
                    avatar_url: currentAvatarUrl,
                    created_at: new Date()
                });
        }
        
        if (result.error) {
            showNotification('Error saving profile: ' + result.error.message, 'error');
        } else {
            showNotification('Profile saved successfully!');
            // Reload profile to confirm
            await loadProfile();
        }
    }
    
    function startVerification() {
        alert('Verification costs $10. Payment integration coming soon!');
    }
    
    window.logout = async function() {
        await supabaseClient.auth.signOut();
        window.location.href = 'index.html';
    };
    
    window.toggleSidebar = toggleSidebar;
    window.closeSidebar = closeSidebar;
    window.addSkill = addSkill;
    window.removeSkill = removeSkill;
    window.saveProfile = saveProfile;
    window.startVerification = startVerification;
    
    loadProfile();
</script>
</body>
</html>
