<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Aether</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav"><div class="logo">AETHER</div></nav>

<div class="auth-container">
    <h2 style="margin-bottom: 8px;">Welcome back</h2>
    <p style="color: rgba(232,232,232,0.6); margin-bottom: 30px;">Sign in to continue</p>
    
    <div id="errorMsg" style="background: rgba(255,51,102,0.2); border: 1px solid #FF3366; border-radius: 12px; padding: 12px; margin-bottom: 20px; color: #FF3366; display: none;"></div>
    <div id="successMsg" style="background: rgba(0,255,200,0.2); border: 1px solid #00FFC8; border-radius: 12px; padding: 12px; margin-bottom: 20px; color: #00FFC8; display: none;"></div>
    
    <div class="input-group"><input type="email" id="email" placeholder="Email" autocomplete="email"></div>
    <div class="input-group"><input type="password" id="password" placeholder="Password" autocomplete="current-password"></div>
    
    <button class="btn-primary" style="width:100%" onclick="signIn()">Sign In →</button>
    <p style="text-align: center; margin-top: 20px; color: rgba(232,232,232,0.5);">Don't have an account? <a href="signup.html" style="color:#00FFC8">Create one</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
    async function signIn() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');
        
        errorDiv.style.display = 'none';
        successDiv.style.display = 'none';
        
        if (!email || !password) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Please fill in all fields';
            return;
        }
        
        try {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                errorDiv.style.display = 'block';
                if (error.message.includes('Email not confirmed')) {
                    errorDiv.textContent = 'Please verify your email address first. Check your inbox.';
                } else {
                    errorDiv.textContent = error.message;
                }
            } else {
                successDiv.style.display = 'block';
                successDiv.textContent = 'Login successful! Redirecting...';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            }
        } catch (err) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Network error. Please try again.';
        }
    }
    
    // Redirect if already logged in
    supabaseClient.auth.getSession().then(({ data }) => {
        if (data.session) window.location.href = 'dashboard.html';
    });
</script>
</body>
</html>
