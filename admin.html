<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Aether</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th, .admin-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .admin-table th { color: #00FFC8; }
        .admin-login { max-width: 400px; margin: 100px auto; text-align: center; }
        .admin-only { display: none; }
    </style>
</head>
<body>

<div id="adminLoginSection" class="admin-login">
    <div class="card" style="padding: 40px;">
        <div class="logo" style="margin-bottom: 20px;">AETHER ADMIN</div>
        <p style="margin-bottom: 20px;">Enter your master password to access admin panel</p>
        <div id="adminError" style="color: #FF3366; margin-bottom: 10px; display: none;"></div>
        <div class="input-group"><input type="password" id="adminPassword" placeholder="Master Password"></div>
        <button class="btn-primary" style="width:100%" onclick="verifyAdmin()">Access Admin Panel</button>
    </div>
</div>

<div id="adminDashboard" class="admin-only">
    <!-- Menu Button (Three lines) -->
    <div class="menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="logo">AETHER ADMIN</div>
        <a href="#" class="nav-item active" onclick="showAdminSection('overview')"><i class="fas fa-chart-line"></i> Overview</a>
        <a href="#" class="nav-item" onclick="showAdminSection('users')"><i class="fas fa-users"></i> Users</a>
        <a href="#" class="nav-item" onclick="showAdminSection('jobs')"><i class="fas fa-briefcase"></i> Jobs</a>
        <a href="#" class="nav-item" onclick="showAdminSection('products')"><i class="fas fa-store"></i> Products</a>
        <a href="#" class="nav-item" onclick="showAdminSection('transactions')"><i class="fas fa-chart-line"></i> Transactions</a>
        <a href="#" class="nav-item" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <!-- Overlay -->
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

    <div class="main">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>Admin Dashboard</h1>
            <button class="btn-outline" onclick="adminLogout()">Exit Admin Mode</button>
        </div>
        <div id="adminContent"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://kpzkjytpbyzhurbvnoyh.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwemtqeXRwYnl6aHVyYnZub3loIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTA2NDMsImV4cCI6MjA5MTI2NjY0M30.fkmq5eanpSkSlnsnhLgUZ94b-6kZ4W7mqL1Dvo4vpcQ';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const AVATAR_BUCKET = 'avartars';
    const JOB_BUCKET = 'job-images';
    const PRODUCT_BUCKET = 'product-images';
    
    const MASTER_PASSWORD = 'AetherAdmin2025';
    
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if (sidebar && overlay) {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
            document.body.style.overflow = 'hidden';
        }
    }
    
    function closeSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if (sidebar && overlay) {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }
    }
    
    function showNotification(message, type = 'success') {
        const notification = document.createElement('div');
        notification.textContent = message;
        notification.style.position = 'fixed';
        notification.style.bottom = '20px';
        notification.style.right = '20px';
        notification.style.background = type === 'success' ? '#00FFC8' : '#FF3366';
        notification.style.color = type === 'success' ? '#0A0A0F' : '#FFFFFF';
        notification.style.padding = '12px 24px';
        notification.style.borderRadius = '50px';
        notification.style.zIndex = '2000';
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    function formatDate(dateString) {
        if (!dateString) return 'N/A';
        return new Date(dateString).toLocaleDateString();
    }
    
    function verifyAdmin() {
        const password = document.getElementById('adminPassword').value;
        const errorDiv = document.getElementById('adminError');
        
        if (password === MASTER_PASSWORD) {
            localStorage.setItem('aether_admin_logged_in', 'true');
            document.getElementById('adminLoginSection').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            loadAdminOverview();
        } else {
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Invalid master password';
        }
    }
    
    function checkAdminAuth() {
        if (localStorage.getItem('aether_admin_logged_in') === 'true') {
            document.getElementById('adminLoginSection').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            loadAdminOverview();
        }
    }
    
    async function loadAdminOverview() {
        const content = document.getElementById('adminContent');
        
        const { data: profiles } = await supabaseClient.from('profiles').select('id');
        const { data: jobs } = await supabaseClient.from('jobs').select('id');
        const { data: products } = await supabaseClient.from('products').select('id');
        const { data: transactions } = await supabaseClient.from('transactions').select('amount');
        
        const totalRevenue = transactions?.reduce((sum, t) => sum + (t.amount > 0 ? t.amount : 0), 0) || 0;
        
        content.innerHTML = `
            <div class="admin-stats">
                <div class="stat-card"><div class="value">${profiles?.length || 0}</div><h3>Total Users</h3></div>
                <div class="stat-card"><div class="value">${jobs?.length || 0}</div><h3>Total Jobs</h3></div>
                <div class="stat-card"><div class="value">${products?.length || 0}</div><h3>Total Products</h3></div>
                <div class="stat-card"><div class="value">$${totalRevenue.toFixed(2)}</div><h3>Total Revenue</h3></div>
            </div>
            <div class="card"><h3>Admin Panel</h3><p>Select a section from the sidebar to manage users, jobs, or products.</p></div>
        `;
    }
    
    async function showAdminSection(section) {
        const content = document.getElementById('adminContent');
        
        if (section === 'overview') { loadAdminOverview(); return; }
        
        if (section === 'users') {
            const { data: users } = await supabaseClient.from('profiles').select('*').order('created_at', { ascending: false });
            content.innerHTML = `
                <div class="card"><h3>All Users</h3><div style="overflow-x: auto;"><table class="admin-table">
                    <thead><tr><th>Name</th><th>Email</th><th>Verified</th><th>Joined</th><th>Action</th></tr></thead>
                    <tbody>${users?.map(u => `<tr><td>${escapeHtml(u.full_name || 'N/A')}</td><td>${escapeHtml(u.email || u.id.substring(0, 8))}</td><td>${u.verified ? '✅' : '❌'}</td><td>${formatDate(u.created_at)}</td><td><button class="btn-sm" onclick="verifyUser('${u.id}')">Verify</button></td></tr>`).join('') || '<tr><td colspan="5">No users found</td></tr>'}</tbody>
                </table></div></div>
            `;
        }
        
        if (section === 'jobs') {
            const { data: jobs } = await supabaseClient.from('jobs').select('*').order('created_at', { ascending: false });
            content.innerHTML = `
                <div class="card"><h3>All Jobs</h3><div style="overflow-x: auto;"><table class="admin-table">
                    <thead><tr><th>Title</th><th>Company</th><th>Posted</th><th>Action</th></tr></thead>
                    <tbody>${jobs?.map(j => `<tr><td>${escapeHtml(j.title)}</td><td>${escapeHtml(j.company)}</td><td>${formatDate(j.created_at)}</td><td><button class="btn-sm" onclick="deleteJob('${j.id}')">Delete</button></td></tr>`).join('') || '<tr><td colspan="4">No jobs found</td></tr>'}</tbody>
                </table></div></div>
            `;
        }
        
        if (section === 'products') {
            const { data: products } = await supabaseClient.from('products').select('*, profiles(full_name)').order('created_at', { ascending: false });
            content.innerHTML = `
                <div class="card"><h3>All Products</h3><div style="overflow-x: auto;"><table class="admin-table">
                    <thead><tr><th>Title</th><th>Seller</th><th>Price</th><th>Posted</th><th>Action</th></tr></thead>
                    <tbody>${products?.map(p => `<tr><td>${escapeHtml(p.title)}</td><td>${escapeHtml(p.profiles?.full_name || 'Unknown')}</td><td>$${parseFloat(p.price).toFixed(2)}</td><td>${formatDate(p.created_at)}</td><td><button class="btn-sm" onclick="deleteProduct('${p.id}')">Delete</button></td></tr>`).join('') || '<tr><td colspan="5">No products found</td></tr>'}</tbody>
                </table></div></div>
            `;
        }
        
        if (section === 'transactions') {
            const { data: transactions } = await supabaseClient.from('transactions').select('*, profiles(full_name)').order('created_at', { ascending: false }).limit(50);
            content.innerHTML = `
                <div class="card"><h3>Recent Transactions</h3><div style="overflow-x: auto;"><table class="admin-table">
                    <thead><tr><th>User</th><th>Amount</th><th>Type</th><th>Date</th></tr></thead>
                    <tbody>${transactions?.map(t => `<tr><td>${escapeHtml(t.profiles?.full_name || t.user_id?.substring(0, 8))}</td><td style="color: ${t.amount > 0 ? '#00FFC8' : '#FF3366'}">${t.amount > 0 ? '+' : ''}$${Math.abs(t.amount).toFixed(2)}</td><td>${t.type || 'transaction'}</td><td>${formatDate(t.created_at)}</td></tr>`).join('') || '<tr><td colspan="4">No transactions found</td></tr>'}</tbody>
                </table></div></div>
            `;
        }
    }
    
    async function verifyUser(userId) {
        await supabaseClient.from('profiles').update({ verified: true }).eq('id', userId);
        showNotification('User verified!');
        showAdminSection('users');
    }
    
    async function deleteJob(jobId) {
        if (confirm('Delete this job?')) {
            await supabaseClient.from('jobs').delete().eq('id', jobId);
            showNotification('Job deleted');
            showAdminSection('jobs');
        }
    }
    
    async function deleteProduct(productId) {
        if (confirm('Delete this product?')) {
            await supabaseClient.from('products').delete().eq('id', productId);
            showNotification('Product deleted');
            showAdminSection('products');
        }
    }
    
    function adminLogout() {
        localStorage.removeItem('aether_admin_logged_in');
        document.getElementById('adminLoginSection').style.display = 'block';
        document.getElementById('adminDashboard').style.display = 'none';
        document.getElementById('adminPassword').value = '';
        showNotification('Logged out of admin mode');
    }
    
    window.verifyAdmin = verifyAdmin;
    window.showAdminSection = showAdminSection;
    window.verifyUser = verifyUser;
    window.deleteJob = deleteJob;
    window.deleteProduct = deleteProduct;
    window.adminLogout = adminLogout;
    window.toggleSidebar = toggleSidebar;
    window.closeSidebar = closeSidebar;
    
    checkAdminAuth();
</script>
</body>
</html>
